name: Sync personal wiki on README change
on:
  push:
    branches: [main, master]
    paths: ['README.md','README.MD','readme.md','docs/README.md']
  workflow_dispatch:
jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
    steps:
      - id: cfg
        run: |
          if [ -z "${TS_AUTHKEY}" ]; then
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "TS_AUTHKEY secret not set — skipping (add it to enable the push trigger)."
          else
            echo "go=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Connect to tailnet (ephemeral)
        if: steps.cfg.outputs.go == 'true'
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          hostname: gh-actions-wiki-sync
      - name: Trigger wiki sync over Tailscale SSH
        if: steps.cfg.outputs.go == 'true'
        run: ssh -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20 hermes@hermes '~/.hermes/wiki-syncrepos.sh'
